AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Arcado Application Load Balancer + target groups + listeners.

  Routing:
    - HTTP/80  -> permanent redirect to HTTPS/443
    - HTTPS/443:
        Host == api.arcado.gagankumar.me  -> Server TG (port 3001, sticky sessions)
        otherwise                          -> Client TG (port 3000)

  WebSocket support:
    - Server TG has lb_cookie stickiness (1 day) so a Socket.IO client lands
      on the same task across upgrades.
    - ALB idle timeout bumped to 600s so long-poll fallbacks don't get cut.

  Two security groups are created and exported:
    - AlbSecurityGroupId: world -> 80/443. Attached to the ALB.
    - TasksSecurityGroupId: only from AlbSecurityGroupId on 3000+3001.
      Will be attached to ECS tasks in the next stack.

Parameters:
  ProjectName:
    Type: String
    Default: arcado

  CertificateArn:
    Type: String
    Description: ACM certificate ARN (must be in same region as the ALB).

  AlbIdleTimeoutSeconds:
    Type: Number
    Default: 600
    MinValue: 60
    MaxValue: 4000

Resources:
  # ───────────────────────── Security groups ─────────────────────────
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Arcado ALB - allow 80 and 443 from internet
      VpcId: !ImportValue arcado-VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP (redirected to HTTPS)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-alb-sg'

  TasksSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Arcado ECS tasks - only from ALB on app ports
      VpcId: !ImportValue arcado-VpcId
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-tasks-sg'

  TasksFromAlbClient:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref TasksSecurityGroup
      IpProtocol: tcp
      FromPort: 3000
      ToPort: 3000
      SourceSecurityGroupId: !Ref AlbSecurityGroup
      Description: Client (Next.js) from ALB

  TasksFromAlbServer:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref TasksSecurityGroup
      IpProtocol: tcp
      FromPort: 3001
      ToPort: 3001
      SourceSecurityGroupId: !Ref AlbSecurityGroup
      Description: Server (Socket.IO) from ALB

  # ───────────────────────── ALB ─────────────────────────
  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ProjectName}-alb'
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets:
        - !ImportValue arcado-PublicSubnet1Id
        - !ImportValue arcado-PublicSubnet2Id
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: !Ref AlbIdleTimeoutSeconds
        - Key: routing.http2.enabled
          Value: 'true'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-alb'

  # ───────────────────────── Target groups ─────────────────────────
  ClientTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-client-tg'
      Port: 3000
      Protocol: HTTP
      VpcId: !ImportValue arcado-VpcId
      TargetType: ip
      HealthCheckPath: /api/health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'

  ServerTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-server-tg'
      Port: 3001
      Protocol: HTTP
      VpcId: !ImportValue arcado-VpcId
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'
        - Key: stickiness.enabled
          Value: 'true'
        - Key: stickiness.type
          Value: lb_cookie
        - Key: stickiness.lb_cookie.duration_seconds
          Value: '86400'

  # ───────────────────────── Listeners ─────────────────────────
  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            Host: '#{host}'
            Path: '/#{path}'
            Query: '#{query}'
            StatusCode: HTTP_301

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ClientTargetGroup

  HttpsRuleApiHost:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpsListener
      Priority: 10
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values:
              - api.arcado.gagankumar.me
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ServerTargetGroup

Outputs:
  AlbDnsName:
    Description: ALB hostname (the value to put in Namecheap CNAMEs)
    Value: !GetAtt Alb.DNSName
    Export:
      Name: !Sub '${ProjectName}-AlbDnsName'

  AlbCanonicalHostedZoneId:
    Description: ALB's hosted zone (for Route53 ALIAS records, unused with Namecheap)
    Value: !GetAtt Alb.CanonicalHostedZoneID
    Export:
      Name: !Sub '${ProjectName}-AlbCanonicalHostedZoneId'

  AlbSecurityGroupId:
    Value: !Ref AlbSecurityGroup
    Export:
      Name: !Sub '${ProjectName}-AlbSecurityGroupId'

  TasksSecurityGroupId:
    Value: !Ref TasksSecurityGroup
    Export:
      Name: !Sub '${ProjectName}-TasksSecurityGroupId'

  ClientTargetGroupArn:
    Value: !Ref ClientTargetGroup
    Export:
      Name: !Sub '${ProjectName}-ClientTargetGroupArn'

  ServerTargetGroupArn:
    Value: !Ref ServerTargetGroup
    Export:
      Name: !Sub '${ProjectName}-ServerTargetGroupArn'
