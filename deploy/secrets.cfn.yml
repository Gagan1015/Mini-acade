AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Arcado application secret. Stores all the env vars the Next.js client
  needs as a single JSON blob in Secrets Manager. ECS task definitions
  inject individual keys via `valueFrom: <secretArn>:<key>::`.

  GitHub credentials default to empty so you can wire them up later via
  `aws secretsmanager update-secret`. Google + NextAuth values are
  required.

Parameters:
  ProjectName:
    Type: String
    Default: arcado

  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: Full Postgres connection string (URL-encoded password).

  NextAuthUrl:
    Type: String
    Default: https://arcado.gagankumar.me

  NextAuthSecret:
    Type: String
    NoEcho: true
    MinLength: 32

  GoogleClientId:
    Type: String
    NoEcho: true

  GoogleClientSecret:
    Type: String
    NoEcho: true

  GitHubClientId:
    Type: String
    NoEcho: true
    Default: ''

  GitHubClientSecret:
    Type: String
    NoEcho: true
    Default: ''

  AdminEmails:
    Type: String
    Description: Comma-separated list (no spaces).

Resources:
  ClientSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/client'
      Description: Arcado client (Next.js) runtime config
      SecretString: !Sub |
        {
          "DATABASE_URL": "${DatabaseUrl}",
          "NEXTAUTH_URL": "${NextAuthUrl}",
          "NEXTAUTH_SECRET": "${NextAuthSecret}",
          "GOOGLE_CLIENT_ID": "${GoogleClientId}",
          "GOOGLE_CLIENT_SECRET": "${GoogleClientSecret}",
          "GITHUB_CLIENT_ID": "${GitHubClientId}",
          "GITHUB_CLIENT_SECRET": "${GitHubClientSecret}",
          "ADMIN_EMAILS": "${AdminEmails}"
        }
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-client-secret'

Outputs:
  ClientSecretArn:
    Value: !Ref ClientSecret
    Export:
      Name: !Sub '${ProjectName}-ClientSecretArn'
