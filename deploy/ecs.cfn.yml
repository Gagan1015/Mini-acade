AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Arcado ECS cluster, task definitions, and services for client (Next.js)
  and server (Socket.IO).

  Both services run on Fargate in the private subnets, with outbound through
  the NAT gateway. The TasksSecurityGroup (created in the ALB stack) only
  allows inbound from the ALB.

  - Client task pulls all 8 env vars from the arcado/client Secrets Manager
    secret via ECS `secrets` mapping (each key extracted from the JSON blob).
  - Server task is configured with plain env vars - no DB, no auth, no
    secrets.

  Logs go to CloudWatch under /aws/ecs/arcado/<service> with 14-day retention.

Parameters:
  ProjectName:
    Type: String
    Default: arcado

  ImageTag:
    Type: String
    Default: latest
    Description: ECR image tag for both services. Bump to force a redeploy
      to a new image.

  ClientUrl:
    Type: String
    Default: https://arcado.gagankumar.me
    Description: Public client URL. Used by server CORS and as
      Set-Cookie domain reference.

  ClientCpu:
    Type: String
    Default: '512'
    AllowedValues: ['256', '512', '1024', '2048']

  ClientMemory:
    Type: String
    Default: '1024'

  ServerCpu:
    Type: String
    Default: '256'
    AllowedValues: ['256', '512', '1024']

  ServerMemory:
    Type: String
    Default: '512'

Resources:
  # ───────────────────────── Cluster ─────────────────────────
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ProjectName
      ClusterSettings:
        - Name: containerInsights
          Value: disabled
      Tags:
        - Key: Name
          Value: !Ref ProjectName

  # ───────────────────────── IAM roles ─────────────────────────
  # Execution role: used by ECS itself to pull images, fetch secrets, write
  # logs. Required even if your containers do nothing AWS-related.
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-ecs-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadAppSecrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !ImportValue arcado-ClientSecretArn

  # Task role: identity assumed by the running container code itself. We
  # don't currently need any AWS API access from the containers, so this is
  # an empty role placeholder. Keeping it explicit so future resources can
  # be added without touching execution.
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-ecs-task-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  # ───────────────────────── Log groups ─────────────────────────
  ClientLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/ecs/${ProjectName}/client'
      RetentionInDays: 14

  ServerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/ecs/${ProjectName}/server'
      RetentionInDays: 14

  # ───────────────────────── Task definitions ─────────────────────────
  ClientTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-client'
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: !Ref ClientCpu
      Memory: !Ref ClientMemory
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ContainerDefinitions:
        - Name: client
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}-client:${ImageTag}'
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: '3000'
            - Name: HOSTNAME
              Value: 0.0.0.0
          # Pull individual JSON keys out of the arcado/client secret. The
          # `:KEY::` suffix is Secrets Manager's "JSON key extraction" syntax.
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Sub
                - '${SecretArn}:DATABASE_URL::'
                - SecretArn: !ImportValue arcado-ClientSecretArn
            - Name: NEXTAUTH_URL
              ValueFrom: !Sub
                - '${SecretArn}:NEXTAUTH_URL::'
                - SecretArn: !ImportValue arcado-ClientSecretArn
            - Name: NEXTAUTH_SECRET
              ValueFrom: !Sub
                - '${SecretArn}:NEXTAUTH_SECRET::'
                - SecretArn: !ImportValue arcado-ClientSecretArn
            - Name: GOOGLE_CLIENT_ID
              ValueFrom: !Sub
                - '${SecretArn}:GOOGLE_CLIENT_ID::'
                - SecretArn: !ImportValue arcado-ClientSecretArn
            - Name: GOOGLE_CLIENT_SECRET
              ValueFrom: !Sub
                - '${SecretArn}:GOOGLE_CLIENT_SECRET::'
                - SecretArn: !ImportValue arcado-ClientSecretArn
            - Name: GITHUB_CLIENT_ID
              ValueFrom: !Sub
                - '${SecretArn}:GITHUB_CLIENT_ID::'
                - SecretArn: !ImportValue arcado-ClientSecretArn
            - Name: GITHUB_CLIENT_SECRET
              ValueFrom: !Sub
                - '${SecretArn}:GITHUB_CLIENT_SECRET::'
                - SecretArn: !ImportValue arcado-ClientSecretArn
            - Name: ADMIN_EMAILS
              ValueFrom: !Sub
                - '${SecretArn}:ADMIN_EMAILS::'
                - SecretArn: !ImportValue arcado-ClientSecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ClientLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: client

  ServerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-server'
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: !Ref ServerCpu
      Memory: !Ref ServerMemory
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ContainerDefinitions:
        - Name: server
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}-server:${ImageTag}'
          Essential: true
          PortMappings:
            - ContainerPort: 3001
              Protocol: tcp
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: '3001'
            - Name: CLIENT_URL
              Value: !Ref ClientUrl
          # Server only needs the DB connection (for NextAuth session lookup
          # in the Socket.IO handshake middleware). Pulled from the same
          # arcado/client JSON secret to avoid duplicating storage.
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Sub
                - '${SecretArn}:DATABASE_URL::'
                - SecretArn: !ImportValue arcado-ClientSecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ServerLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: server

  # ───────────────────────── Services ─────────────────────────
  ClientService:
    Type: AWS::ECS::Service
    # Service can't attach to a target group until the listener is up.
    # The TG is owned by the ALB stack, but its presence is enough.
    Properties:
      ServiceName: !Sub '${ProjectName}-client'
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      DesiredCount: 1
      TaskDefinition: !Ref ClientTaskDefinition
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !ImportValue arcado-PrivateSubnet1Id
            - !ImportValue arcado-PrivateSubnet2Id
          SecurityGroups:
            - !ImportValue arcado-TasksSecurityGroupId
      LoadBalancers:
        - ContainerName: client
          ContainerPort: 3000
          TargetGroupArn: !ImportValue arcado-ClientTargetGroupArn
      HealthCheckGracePeriodSeconds: 60
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-client'

  ServerService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub '${ProjectName}-server'
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      DesiredCount: 1
      TaskDefinition: !Ref ServerTaskDefinition
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !ImportValue arcado-PrivateSubnet1Id
            - !ImportValue arcado-PrivateSubnet2Id
          SecurityGroups:
            - !ImportValue arcado-TasksSecurityGroupId
      LoadBalancers:
        - ContainerName: server
          ContainerPort: 3001
          TargetGroupArn: !ImportValue arcado-ServerTargetGroupArn
      HealthCheckGracePeriodSeconds: 120
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-server'

Outputs:
  ClusterName:
    Value: !Ref Cluster
  ClientServiceName:
    Value: !GetAtt ClientService.Name
  ServerServiceName:
    Value: !GetAtt ServerService.Name
  ClientLogGroupName:
    Value: !Ref ClientLogGroup
  ServerLogGroupName:
    Value: !Ref ServerLogGroup
